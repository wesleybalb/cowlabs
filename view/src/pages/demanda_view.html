<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
  <title>CowLabs · Demanda</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_back" rel="stylesheet" />
  <link rel="stylesheet" href="/view/src/styles/default.css" />
  <link rel="stylesheet" href="/view/src/styles/demanda_view.css" />
</head>
<body>

  <!-- Navbar injetada pelo componente nav.js -->
  <div id="nav-root"></div>

  <main class="pb-5">
    <div class="container">
      <div class="d-flex my-4">
        <button class="personal_btn" id="back" type="button">
          <span class="material-symbols-outlined">arrow_back</span> Voltar
        </button>
      </div>

      <div class="row">
        <div class="col-12">
          <div class="card mb-3 p-4">
            <h4 id="tituloDemanda" class="fw-800"></h4>
            <p id="descricaoDemanda" class="text-muted"></p>
            <span class="d-flex align-items-center gap-2">
              <img src="/view/src/img/ImagemUser.jpg" class="imagem-user rounded-circle" alt="" id="avatarDemanda">
              <span class="fw-bold" id="nomeUsuario"></span>
            </span>
          </div>

          <div class="coments card p-3">
            <h4 class="m-2 fw-800">Comentários</h4>
            <div class="m-2">
              <form class="d-grid col-12" id="form-comentario" onsubmit="return false;">
                <textarea id="msg" placeholder="Escreva um comentário..."></textarea>
                <div>
                  <button type="button" id="comentar" class="personal_btn">Comentar</button>
                </div>
              </form>
            </div>

            <!-- Comentários carregados dinamicamente -->
            <div class="newcoments m-2" id="lista-comentarios">
              <p class="text-muted small text-center py-3">Carregando comentários...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer injetado pelo componente footer.js -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import nav from "/view/src/components/nav.js";
    import footer from "/view/src/components/footer.js";
    import myModal from "/view/src/components/mymodal.js";
    import { requireAuth } from "/view/src/services/auth.js";
    import { API_URL } from "/view/src/services/api.js";

    nav();

    const auth = requireAuth("/view/src/pages/login.html");
    if (auth) {
      const { user, token } = auth;

      // Lê os dados salvos pelo selectDemanda.js
      const dados = JSON.parse(localStorage.getItem("demandaSelecionada") || "null");

      if (dados) {
        document.getElementById("tituloDemanda").textContent  = dados.titulo   || "";
        document.getElementById("descricaoDemanda").innerHTML = dados.descricao || "";
        document.getElementById("nomeUsuario").textContent    = dados.usuario   || "";

        // Se temos o ID, busca dados atualizados no backend
        if (dados.id) {
          carregarDemanda(dados.id, token);
          carregarComentarios(dados.id, token);
        } else {
          mostrarSemComentarios();
        }
      } else {
        document.getElementById("tituloDemanda").textContent = "Demanda não encontrada";
        mostrarSemComentarios();
      }

      // Handler do botão comentar
      document.getElementById("comentar").addEventListener("click", async () => {
        await enviarComentario(dados?.id, user, token);
      });
    }

    footer();

    document.getElementById("back").addEventListener("click", () => history.back());

    // ── Funções ─────────────────────────────────────────────────────────────

    async function carregarDemanda(id, token) {
      try {
        const res = await fetch(`${API_URL}/demandas/id/${id}`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (!res.ok) return;
        const dados = await res.json();
        const demanda = Array.isArray(dados) ? dados[0] : dados;
        if (!demanda) return;

        document.getElementById("tituloDemanda").textContent    = demanda.demanda_title   || "";
        document.getElementById("descricaoDemanda").textContent = demanda.demanda_content || "";
        document.getElementById("nomeUsuario").textContent      = demanda.user_name       || "";
      } catch (e) {
        console.warn("Não foi possível atualizar dados da demanda:", e.message);
      }
    }

    async function carregarComentarios(demandaId, token) {
      try {
        const res = await fetch(`${API_URL}/demandas/${demandaId}/comentarios`, {
          headers: { Authorization: `Bearer ${token}` },
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const lista = await res.json();
        renderComentarios(lista);
      } catch (e) {
        console.warn("Erro ao carregar comentários:", e.message);
        mostrarSemComentarios();
      }
    }

    function renderComentarios(lista) {
      const container = document.getElementById("lista-comentarios");
      if (!container) return;

      if (!lista || lista.length === 0) {
        mostrarSemComentarios();
        return;
      }

      container.innerHTML = lista.map((c) => {
        const nome = c.user_real_name || c.user_name || "Usuário";
        return `
          <div class="card card_coment m-2 p-2">
            <div class="name_user m-2 d-flex align-items-center gap-2">
              <img src="/view/src/img/ImagemUser.jpg" class="imagem-user rounded-circle" alt="">
              <span class="fs-5 fw-bold user_name">${nome}</span>
            </div>
            <p class="card-text descricao m-2 text-muted">${c.coment_content || ""}</p>
          </div>`;
      }).join("");
    }

    function mostrarSemComentarios() {
      const lista = document.getElementById("lista-comentarios");
      if (lista) {
        lista.innerHTML = `
          <p class="text-muted small text-center py-3">
            Nenhum comentário ainda. Seja o primeiro!
          </p>`;
      }
    }

    async function enviarComentario(demandaId, user, token) {
      const msg = document.getElementById("msg")?.value.trim();
      if (!msg) {
        myModal("Escreva um comentário antes de enviar.", { type: "warning" });
        return;
      }

      if (!demandaId) {
        myModal("Não foi possível identificar a demanda.", { type: "warning" });
        return;
      }

      try {
        const res = await fetch(`${API_URL}/demandas/${demandaId}/comentarios`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({ conteudo: msg }),
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || `HTTP ${res.status}`);
        }

        // Sucesso: adiciona comentário na lista sem recarregar
        const nome = user.user_real_name || user.user_name || "Você";
        const lista = document.getElementById("lista-comentarios");
        const placeholder = lista?.querySelector("p.text-muted");
        if (placeholder) placeholder.remove();

        lista.insertAdjacentHTML("afterbegin", `
          <div class="card card_coment m-2 p-2">
            <div class="name_user m-2 d-flex align-items-center gap-2">
              <img src="/view/src/img/ImagemUser.jpg" class="imagem-user rounded-circle" alt="">
              <span class="fs-5 fw-bold user_name">${nome}</span>
            </div>
            <p class="card-text descricao m-2 text-muted">${msg}</p>
          </div>
        `);

        document.getElementById("msg").value = "";
        myModal("Comentário enviado!", { type: "success" });

      } catch (e) {
        console.error("Erro ao comentar:", e);
        myModal("Erro ao enviar comentário. Tente novamente.", { type: "danger" });
      }
    }
  </script>
</body>
</html>
