<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CowLabs - Meu Perfil</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="/view/src/styles/default.css" />
  <link rel="stylesheet" href="/view/src/styles/profile.css" />
</head>
<body>

  <!-- Navbar injetada pelo componente nav.js -->
  <div id="nav-root"></div>

  <div class="profile-hero"></div>

  <main class="container mb-5" style="margin-top: -80px;">
    <div class="row g-4">

      <!-- Coluna esquerda: foto, rating, ações -->
      <div class="col-lg-4">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
          <div class="card-body text-center pt-5">

            <div class="profile-pic-wrapper mb-3">
              <img
                src="https://ui-avatars.com/api/?name=U&size=150&background=006eff&color=fff"
                class="rounded-circle shadow"
                id="profile-image"
                alt="Foto de perfil"
              >
              <div class="upload-overlay" id="upload-trigger">
                <i class="bi bi-camera-fill"></i>
              </div>
              <input type="file" id="image-input" class="d-none" accept="image/*">
            </div>

            <h4 class="fw-800 mb-0" id="userName">—</h4>
            <p class="text-primary fw-600 mb-3" id="Role">—</p>

            <div class="rating-box p-3 rounded-4 bg-light mb-4">
              <p class="small text-muted mb-1">Reputação na Comunidade</p>
              <div id="rating" class="stars d-flex justify-content-center gap-1 text-warning fs-4">
                <i class="bi bi-star" data-value="1"></i>
                <i class="bi bi-star" data-value="2"></i>
                <i class="bi bi-star" data-value="3"></i>
                <i class="bi bi-star" data-value="4"></i>
                <i class="bi bi-star" data-value="5"></i>
              </div>
              <span class="badge bg-white text-dark mt-2 shadow-sm" id="rating-value">— / 5.0</span>
            </div>

            <div class="d-grid gap-2">
              <button class="btn btn-primary rounded-3 py-2 fw-bold">Editar Perfil</button>
              <button class="btn btn-outline-secondary rounded-3 py-2">Configurações</button>
            </div>
          </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4 mt-4 p-4">
          <h6 class="fw-bold mb-3">Progresso do Perfil</h6>
          <div class="d-flex justify-content-between align-items-end mb-1">
            <span class="fs-4 fw-800 text-success">68%</span>
            <span class="small text-muted">Quase lá!</span>
          </div>
          <div class="progress mb-3" style="height: 8px">
            <div class="progress-bar bg-success rounded-pill" style="width: 68%"></div>
          </div>
          <ul class="list-unstyled small text-muted">
            <li class="mb-2"><i class="bi bi-check-circle-fill text-success me-2"></i> Foto de perfil</li>
            <li class="mb-2"><i class="bi bi-plus-circle me-2"></i> Adicionar biografia <span class="text-primary">(+20%)</span></li>
            <li><i class="bi bi-plus-circle me-2"></i> Vincular LinkedIn <span class="text-primary">(+12%)</span></li>
          </ul>
        </div>
      </div>

      <!-- Coluna direita: métricas, conquistas, info -->
      <div class="col-lg-8">

        <div class="row g-3 mb-4">
          <div class="col-md-4">
            <div class="metric-card shadow-sm p-4 bg-white rounded-4 border-0 h-100">
              <i class="bi bi-rocket-takeoff fs-2 text-primary mb-2"></i>
              <h3 class="fw-800 mb-0" id="projectsDone">—</h3>
              <p class="text-muted small mb-0">Demandas Atendidas</p>
            </div>
          </div>
          <div class="col-md-4">
            <div class="metric-card shadow-sm p-4 bg-white rounded-4 border-0 h-100">
              <i class="bi bi-clock-history fs-2 text-success mb-2"></i>
              <h3 class="fw-800 mb-0"><span id="workedHours">—</span><small class="fs-6">h</small></h3>
              <p class="text-muted small mb-0">Horas Acumuladas</p>
            </div>
          </div>
          <div class="col-md-4">
            <div class="metric-card shadow-sm p-4 bg-white rounded-4 border-0 h-100">
              <i class="bi bi-trophy fs-2 text-warning mb-2"></i>
              <h3 class="fw-800 mb-0" id="clientRatings">—</h3>
              <p class="text-muted small mb-0">Avaliações Recebidas</p>
            </div>
          </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
          <h5 class="fw-800 mb-4"><i class="bi bi-award me-2 text-primary"></i>Suas Conquistas</h5>
          <div class="d-flex flex-wrap gap-4">
            <div class="badge-item text-center">
              <div class="icon-circle bg-warning bg-opacity-10 text-warning mb-2">
                <i class="bi bi-lightning-fill fs-3"></i>
              </div>
              <span class="d-block small fw-bold">Pioneiro</span>
            </div>
            <div class="badge-item text-center">
              <div class="icon-circle bg-primary bg-opacity-10 text-primary mb-2">
                <i class="bi bi-people-fill fs-3"></i>
              </div>
              <span class="d-block small fw-bold">Colaborador</span>
            </div>
            <div class="badge-item text-center opacity-25">
              <div class="icon-circle bg-secondary bg-opacity-10 text-secondary mb-2">
                <i class="bi bi-star-fill fs-3"></i>
              </div>
              <span class="d-block small fw-bold">Expert</span>
            </div>
          </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4 p-4">
          <h5 class="fw-800 mb-3">Informações de Conta</h5>
          <div class="row">
            <div class="col-sm-6 mb-3">
              <label class="text-muted small">Ingressou em</label>
              <p class="fw-600" id="joinDate">—</p>
            </div>
            <div class="col-sm-6 mb-3">
              <label class="text-muted small">E-mail</label>
              <p class="fw-600" id="userEmail">—</p>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Footer injetado pelo componente footer.js -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/view/src/services/profile.js"></script>
</body>
</html>
