<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CowLabs · Cadastre-se</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="shortcut icon" href="https://cowlabs.com.br/assets/img/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="/view/src/styles/default.css" />
  <link rel="stylesheet" href="/view/src/styles/register.css" />
</head>
<body class="auth-page">

  <header class="auth-topbar">
    <div class="container d-flex justify-content-center">
      <a class="logo-font" href="/view/public/index.html">Cow<span>Labs</span></a>
    </div>
  </header>

  <main class="auth-wrapper">
    <div class="auth-card shadow-lg">
      <div class="text-center mb-4">
        <h1 class="fw-800 h3 mb-1">Crie sua conta</h1>
        <p class="text-muted mb-0">Junte-se à comunidade CowLabs</p>
      </div>

      <form id="registerForm">

        <!-- ===== Dados da conta ===== -->
        <h6 class="section-title"><i class="bi bi-person-badge me-2"></i>Dados da conta</h6>
        <div class="row g-3 mb-2">
          <div class="col-12">
            <label for="User" class="form-label fw-600">Usuário</label>
            <input id="User" type="text" name="User" class="form-control" placeholder="Nome que todos vão ver" required>
            <div id="UserCheckerMsg"></div>
          </div>

          <div class="col-12">
            <label for="Realname" class="form-label fw-600">Nome completo (real)</label>
            <input id="Realname" type="text" name="Realname" class="form-control" placeholder="Visível apenas para os professores" required>
          </div>

          <div class="col-md-6">
            <label for="CPF" class="form-label fw-600">CPF</label>
            <input id="CPF" type="number" name="CPF" class="form-control" placeholder="000.000.000-00" required>
          </div>

          <div class="col-md-6">
            <label for="Email" class="form-label fw-600">E-mail</label>
            <input id="Email" type="email" name="Email" class="form-control" placeholder="seu@email.com" required>
          </div>

          <div class="col-12">
            <label for="curso" class="form-label fw-600">Estou cursando</label>
            <select id="curso" name="curso" class="form-select">
              <option value="Administração">Administração</option>
              <option value="Ciências Biológicas">Ciências Biológicas</option>
              <option value="Ciências Contábeis">Ciências Contábeis</option>
              <option value="Direito">Direito</option>
              <option value="Design">Design</option>
              <option value="Educação Física">Educação Física</option>
              <option value="Engenharia ABI">Engenharia ABI</option>
              <option value="Engenharia Ambiental">Engenharia Ambiental</option>
              <option value="Engenharia Civil">Engenharia Civil</option>
              <option value="Engenharia de Produção">Engenharia de Produção</option>
              <option value="Engenharia Elétrica">Engenharia Elétrica</option>
              <option value="Engenharia Mecânica">Engenharia Mecânica</option>
              <option value="Enfermagem">Enfermagem</option>
              <option value="Medicina">Medicina</option>
              <option value="Nutrição">Nutrição</option>
              <option value="Odontologia">Odontologia</option>
              <option value="Publicidade e Propaganda">Publicidade e Propaganda</option>
              <option value="Serviço Social">Serviço Social</option>
              <option value="Sistemas de Informação">Sistemas de Informação</option>
              <option value="Técnico em Enfermagem">Técnico em Enfermagem</option>
            </select>
          </div>
        </div>

        <!-- ===== Endereço ===== -->
        <h6 class="section-title mt-4"><i class="bi bi-geo-alt me-2"></i>Endereço</h6>
        <div class="row g-3 mb-2">
          <div class="col-md-4">
            <label for="CEP" class="form-label fw-600">CEP</label>
            <input id="CEP" type="text" name="CEP" class="form-control" placeholder="00000-000" required>
          </div>
          <div class="col-md-2">
            <label for="uf" class="form-label fw-600">UF</label>
            <input id="uf" type="text" name="uf" class="form-control" required>
          </div>
          <div class="col-md-6">
            <label for="cidade" class="form-label fw-600">Cidade</label>
            <input id="cidade" type="text" name="cidade" class="form-control" required>
          </div>

          <div class="col-md-8">
            <label for="endereco" class="form-label fw-600">Endereço</label>
            <input id="endereco" type="text" name="endereco" class="form-control" required>
          </div>
          <div class="col-md-4">
            <label for="numero" class="form-label fw-600">Número</label>
            <input id="numero" type="text" name="numero" class="form-control" required>
          </div>

          <div class="col-md-6">
            <label for="bairro" class="form-label fw-600">Bairro</label>
            <input id="bairro" type="text" name="bairro" class="form-control" required>
          </div>
          <div class="col-md-6">
            <label for="complemento" class="form-label fw-600">Complemento</label>
            <input id="complemento" type="text" name="complemento" class="form-control">
          </div>
        </div>

        <!-- ===== Senha ===== -->
        <h6 class="section-title mt-4"><i class="bi bi-shield-lock me-2"></i>Segurança</h6>
        <div class="row g-3 mb-2">
          <div class="col-md-6">
            <label for="Senha" class="form-label fw-600">Senha</label>
            <input id="Senha" type="password" name="Senha" class="form-control" required>
          </div>
          <div class="col-md-6">
            <label for="ConfirmSenha" class="form-label fw-600">Confirme a senha</label>
            <input id="ConfirmSenha" type="password" name="ConfirmSenha" class="form-control" placeholder="Repita sua senha" required>
          </div>
        </div>

        <div id="InfoUser" class="mt-3"></div>

        <button type="submit" class="btn btn-send w-100 py-3 mt-3" id="RegBtn">Registre-se</button>
      </form>

      <p class="text-center text-muted mt-4 mb-0">
        Já tem conta?
        <a href="/view/src/pages/login.html" class="fw-600 link-primary-brand">Entrar</a>
      </p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/view/src/services/register.js"></script>
</body>
</html>
