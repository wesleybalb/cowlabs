<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
  <title>CowLabs · Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="shortcut icon" href="https://cowlabs.com.br/assets/img/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/view/src/styles/default.css">
  <link rel="stylesheet" href="/view/src/styles/login.css">
</head>
<body class="auth-page">

  <!-- Topo simples com a marca -->
  <header class="auth-topbar">
    <div class="container d-flex justify-content-center">
      <a class="logo-font" href="/view/public/index.html">Cow<span>Labs</span></a>
    </div>
  </header>

  <main class="auth-wrapper">
    <div class="auth-card shadow-lg">
      <div class="text-center mb-4">
        <h1 class="fw-800 h3 mb-1">Bem-vindo de volta</h1>
        <p class="text-muted mb-0">Faça login para continuar</p>
      </div>

      <form id="login-form">
        <div class="mb-3">
          <label for="user_email" class="form-label fw-600">E-mail</label>
          <div class="input-icon">
            <i class="bi bi-envelope"></i>
            <input id="user_email" type="text" name="user_email" class="form-control" placeholder="seu@email.com" required>
          </div>
        </div>

        <div class="mb-2">
          <label for="Senha" class="form-label fw-600">Senha</label>
          <div class="input-icon">
            <i class="bi bi-lock"></i>
            <input id="Senha" type="password" name="password" class="form-control" placeholder="••••••••" required>
          </div>
        </div>

        <div class="text-end mb-4">
          <a href="#" class="link-muted small">Esqueci minha senha</a>
        </div>

        <button type="submit" class="btn btn-send w-100 py-3 continue-btn">Continuar</button>
      </form>

      <p class="text-center text-muted mt-4 mb-0">
        Ainda não tem conta?
        <a href="/view/src/pages/register.html" class="fw-600 link-primary-brand">Cadastre-se</a>
      </p>
    </div>

    <!-- Rodapé compacto da página de auth -->
    <div class="auth-footer text-center">
      <p class="mb-2">© 2025 CowLabs. Todos os direitos reservados.</p>
      <ul class="list-unstyled d-flex justify-content-center gap-3 mb-0">
        <li><a href="#"><i class="bi bi-twitter-x"></i></a></li>
        <li><a href="#"><i class="bi bi-instagram"></i></a></li>
        <li><a href="#"><i class="bi bi-facebook"></i></a></li>
        <li><a href="#"><i class="bi bi-linkedin"></i></a></li>
        <li><a href="#"><i class="bi bi-whatsapp"></i></a></li>
      </ul>
    </div>
  </main>

  <!-- Diálogo de sucesso (usado por login.js) -->
  <dialog class="login_dialog" id="meuDialogo">
    <div class="text-center">
      <i class="bi bi-check-circle-fill text-success fs-1"></i>
      <p class="fs-5 mt-2 mb-0">Login realizado!<br>Você será redirecionado.</p>
    </div>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/view/src/services/login.js"></script>
</body>
</html>
