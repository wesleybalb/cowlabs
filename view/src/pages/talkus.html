<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CowLabs - Fale Conosco</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="/view/src/styles/default.css" />
  <link rel="stylesheet" href="/view/src/styles/talkus.css" />
</head>
<body>

  <!-- Navbar injetada pelo componente nav.js -->
  <div id="nav-root"></div>

  <header class="contact-hero py-5 text-center text-white">
    <div class="container">
      <h1 class="display-5 fw-800">Fale com o nosso time</h1>
      <p class="lead opacity-75">Dúvidas, sugestões ou suporte técnico? Estamos aqui para ajudar.</p>
    </div>
  </header>

  <main class="container mb-5">
    <div class="row justify-content-center" style="margin-top: -50px;">
      <div class="col-lg-6 col-md-10">
        <div class="contact-card shadow-lg p-4 p-md-5">
          <form id="contactForm">
            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="nome" placeholder="Seu Nome" required>
              <label for="nome">Seu Nome completo</label>
            </div>

            <div class="form-floating mb-3">
              <input type="email" class="form-control" id="email" placeholder="nome@exemplo.com" required>
              <label for="email">E-mail acadêmico ou pessoal</label>
            </div>

            <div class="form-floating mb-3">
              <input type="tel" class="form-control" id="telefone" placeholder="(24) 99999-9999">
              <label for="telefone">WhatsApp (opcional)</label>
            </div>

            <div class="form-floating mb-4">
              <textarea class="form-control" placeholder="Sua mensagem" id="mensagem" style="height: 150px" required></textarea>
              <label for="mensagem">Como podemos ajudar?</label>
            </div>

            <button type="submit" class="btn btn-send w-100 py-3 mb-3">
              Enviar Mensagem <i class="bi bi-send ms-2"></i>
            </button>
          </form>
        </div>

        <div class="text-center mt-4">
          <p class="text-muted small">Prefere e-mail direto? <br> <strong>suporte@cowlabs.com.br</strong></p>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer injetado pelo componente footer.js -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/view/src/services/talkus.js"></script>
</body>
</html>
